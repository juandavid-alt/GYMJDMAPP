<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3AA0FF"/>
      <stop offset="0.45" stop-color="#0A84FF"/>
      <stop offset="1" stop-color="#0A3DDB"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.28" r="0.75">
      <stop offset="0" stop-color="#7CE0FF" stop-opacity="0.55"/>
      <stop offset="0.5" stop-color="#7CE0FF" stop-opacity="0.0"/>
    </radialGradient>
    <linearGradient id="metal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="0.5" stop-color="#EAF3FF"/>
      <stop offset="1" stop-color="#C4DBFF"/>
    </linearGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
    <filter id="shadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#062A8C" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- background -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <rect width="512" height="512" fill="url(#glow)"/>

  <!-- futuristic light streaks -->
  <g opacity="0.14" stroke="#FFFFFF" stroke-width="2" fill="none">
    <path d="M -40 150 L 560 -40"/>
    <path d="M -40 210 L 560 20"/>
    <path d="M -40 470 L 560 300"/>
  </g>

  <!-- soft glow behind mark -->
  <g transform="rotate(-22 256 256)">
    <rect x="118" y="188" width="276" height="136" rx="40" fill="#BFE4FF" opacity="0.35" filter="url(#soft)"/>
  </g>

  <!-- dumbbell -->
  <g transform="rotate(-22 256 256)" fill="url(#metal)" filter="url(#shadow)">
    <rect x="181" y="242" width="150" height="28" rx="14"/>
    <rect x="165" y="214" width="27" height="84" rx="12"/>
    <rect x="320" y="214" width="27" height="84" rx="12"/>
    <rect x="133" y="196" width="31" height="120" rx="15"/>
    <rect x="348" y="196" width="31" height="120" rx="15"/>
    <rect x="120" y="221" width="16" height="70" rx="8"/>
    <rect x="376" y="221" width="16" height="70" rx="8"/>
  </g>

  <!-- top gloss -->
  <ellipse cx="256" cy="150" rx="220" ry="120" fill="#FFFFFF" opacity="0.06"/>
</svg>
